<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문적인 성격 유형 검사</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F8F9FA;
            --text-color: #333;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1, h2, h3 { color: #1a1a1a; }
        .hidden { display: none !important; }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn {
            padding: 18px;
            border: 2px solid #e9ecef;
            background: transparent;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover {
            border-color: var(--primary-color);
            background-color: rgba(74, 144, 226, 0.05);
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
        }
        .btn-primary:hover { background-color: #357ABD; }

        /* Result Styles */
        .result-header { text-align: center; margin-bottom: 40px; }
        .emoji-large { font-size: 100px; margin-bottom: 20px; }
        .type-badge {
            display: inline-block;
            padding: 8px 16px;
            background-color: #e8f0fe;
            color: var(--primary-color);
            border-radius: 20px;
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .section h3 { margin-top: 0; color: var(--primary-color); font-size: 18px; }
        ul { padding-left: 20px; margin: 0; line-height: 1.6; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 시작 화면 -->
        <div id="start-screen">
            <h1 style="text-align: center;">심층 성격 유형 검사</h1>
            <p style="text-align: center; color: #666; margin-bottom: 40px;">당신의 진짜 모습을 알아보는 32개의 질문</p>
            <button class="btn btn-primary" style="width: 100%;" onclick="startQuiz()">검사 시작하기</button>
        </div>

        <!-- 검사 화면 -->
        <div id="quiz-screen" class="hidden">
            <div class="progress-bar"><div class="progress" id="progress"></div></div>
            <h2 id="question-text" style="font-size: 22px; line-height: 1.4;">질문 로딩 중...</h2>
            <div class="btn-group">
                <button class="btn" onclick="handleAnswer(2)">매우 그렇다</button>
                <button class="btn" onclick="handleAnswer(1)">약간 그렇다</button>
                <button class="btn" onclick="handleAnswer(-1)">약간 아니다</button>
                <button class="btn" onclick="handleAnswer(-2)">매우 아니다</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden">
            <div class="result-header">
                <div class="emoji-large" id="res-emoji"></div>
                <div class="type-badge" id="res-type"></div>
                <h1 id="res-title" style="margin-top: 15px;"></h1>
                <p id="res-subtitle" style="color: #666;"></p>
            </div>

            <div class="section">
                <h3>💡 핵심 특징</h3>
                <ul id="res-traits"></ul>
            </div>
            
            <div class="section">
                <h3>👍 강점 및 장점</h3>
                <ul id="res-pros"></ul>
            </div>
            
            <div class="section">
                <h3>👎 주의할 점 및 단점</h3>
                <ul id="res-cons"></ul>
            </div>
            
            <div class="section">
                <h3>🎯 전문적 조언 및 보완점</h3>
                <p id="res-advice" style="line-height: 1.6;"></p>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="location.reload()">다시 검사하기</button>
        </div>
    </div>

    <script>
        // 1. 데이터 베이스 (실제 개발 시 별도 JSON 파일로 분리하는 것이 좋습니다)
        // 질문 배열 (type: 측정 지표, direction: 양수면 앞의 지표(E,S,T,J), 음수면 뒤의 지표(I,N,F,P)에 점수 부여)
        const questions = [
            { id: 1, text: "새로운 사람들을 만나는 모임에 가는 것이 즐겁고 에너지를 얻는다.", type: "EI", direction: 1 },
            { id: 2, text: "주말에는 밖으로 나가는 것보다 집에서 혼자만의 시간을 보내는 것이 충전이 된다.", type: "EI", direction: -1 },
            { id: 3, text: "미래의 가능성이나 추상적인 개념보다는, 현재 당장 눈앞에 있는 현실적인 문제 해결이 더 중요하다.", type: "SN", direction: 1 },
            { id: 4, text: "업무나 과제를 할 때, 객관적인 논리와 사실보다는 사람들의 감정과 상황을 먼저 고려하게 된다.", type: "TF", direction: -1 },
            { id: 5, text: "여행을 갈 때 세부적인 일정(시간표, 식당, 동선)을 미리 철저하게 계획하는 편이다.", type: "JP", direction: 1 },
            // ... 32개까지 이 형식으로 확장합니다. (예시를 위해 5개만 작성)
        ];

        // 16가지 결과 데이터베이스
        const mbtiData = {
            "INTJ": {
                emoji: "🦅",
                title: "용의주도한 전략가",
                subtitle: "상상력이 풍부하며 철두철미한 계획을 세우는 전략가형",
                traits: [
                    "전체적인 시스템을 파악하고 최적화하는 것을 즐깁니다.",
                    "독립심이 강하고 지적인 도전을 두려워하지 않습니다.",
                    "자신만의 명확한 비전과 기준을 가지고 행동합니다."
                ],
                pros: [
                    "복잡한 문제를 분석하고 해결책을 도출하는 탁월한 능력",
                    "목표 달성을 위한 높은 추진력과 결단력",
                    "객관적이고 논리적인 판단력"
                ],
                cons: [
                    "타인의 감정을 고려하는 것에 둔감할 수 있음",
                    "자신의 기준이 너무 높아 스스로나 타인을 피곤하게 만들 수 있음",
                    "예상치 못한 변수에 유연하게 대처하기 어려워함"
                ],
                advice: "논리와 이성도 중요하지만, 협업 과정에서는 타인의 감정적 반응도 중요한 데이터로 인식하는 연습이 필요합니다. 완벽주의를 조금 내려놓고, 때로는 유연한 태도를 취하는 것이 장기적인 프로젝트 성공에 도움이 됩니다."
            },
            "ENFP": {
                emoji: "🐬",
                title: "재기발랄한 활동가",
                subtitle: "열정적이고 창의적이며, 긍정적인 에너지가 넘치는 유형",
                traits: [
                    "새로운 아이디어를 내고 무언가를 시작하는 것을 좋아합니다.",
                    "사람들의 감정에 민감하고 공감 능력이 뛰어납니다.",
                    "자유롭고 융통성 있는 삶을 추구합니다."
                ],
                pros: [
                    "뛰어난 상상력과 창의적인 문제 해결 능력",
                    "주변 사람들에게 긍정적인 에너지를 불어넣는 카리스마",
                    "뛰어난 적응력과 유연한 사고"
                ],
                cons: [
                    "시작한 일을 끝까지 마무리하는 뒷심이 부족할 수 있음",
                    "반복적이고 체계적인 업무에 쉽게 지루함을 느낌",
                    "스트레스를 받을 때 감정 기복이 심해질 수 있음"
                ],
                advice: "아이디어를 구상하는 단계에서 멈추지 않고, 이를 실행하기 위한 구체적인 프로세스와 마일스톤을 설정하는 연습이 필요합니다. 일정 관리 툴을 적극적으로 활용하여 작업의 마무리를 짓는 습관을 들이세요."
            }
            // ... 나머지 14개 유형의 데이터도 동일한 구조로 추가합니다.
        };

        // 2. 상태 관리 (State)
        let currentQuestionIndex = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        // 3. 로직 및 렌더링 함수
        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `Q${currentQuestionIndex + 1}. ${q.text}`;
            
            // 프로그래스 바 업데이트
            const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;
        }

        function handleAnswer(weight) {
            const q = questions[currentQuestionIndex];
            
            // 점수 계산 알고리즘: 사용자의 응답 강도(weight)와 질문의 방향(direction)을 곱하여 점수 산출
            // 예: EI 타입이고 방향이 1(E)인데, 사용자가 '매우 그렇다(2)'를 선택하면 E에 2점 추가
            // 방향이 -1(I)인데, '매우 아니다(-2)'를 선택하면 E(-1 * -2 = 2)에 해당하는 점수로 환산 가능하나, 
            // 여기서는 직관적으로 분리하여 저장합니다.
            
            const scoreToAdd = weight * q.direction;
            
            if (q.type === "EI") {
                if (scoreToAdd > 0) scores.E += scoreToAdd;
                else scores.I += Math.abs(scoreToAdd);
            } else if (q.type === "SN") {
                if (scoreToAdd > 0) scores.S += scoreToAdd;
                else scores.N += Math.abs(scoreToAdd);
            } else if (q.type === "TF") {
                if (scoreToAdd > 0) scores.T += scoreToAdd;
                else scores.F += Math.abs(scoreToAdd);
            } else if (q.type === "JP") {
                if (scoreToAdd > 0) scores.J += scoreToAdd;
                else scores.P += Math.abs(scoreToAdd);
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        function calculateResult() {
            // 최종 MBTI 타입 도출
            const type = (scores.E >= scores.I ? "E" : "I") +
                         (scores.S >= scores.N ? "S" : "N") +
                         (scores.T >= scores.F ? "T" : "F") +
                         (scores.J >= scores.P ? "J" : "P");
            
            showResultScreen(type);
        }

        function showResultScreen(type) {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // 테스트용 안전장치 (데이터가 없을 경우 INTJ로 기본 출력)
            const data = mbtiData[type] || mbtiData["INTJ"]; 

            document.getElementById('res-type').innerText = type;
            document.getElementById('res-emoji').innerText = data.emoji;
            document.getElementById('res-title').innerText = data.title;
            document.getElementById('res-subtitle').innerText = data.subtitle;

            // 리스트 렌더링 헬퍼 함수
            const renderList = (elementId, array) => {
                const el = document.getElementById(elementId);
                el.innerHTML = '';
                array.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    el.appendChild(li);
                });
            };

            renderList('res-traits', data.traits);
            renderList('res-pros', data.pros);
            renderList('res-cons', data.cons);
            document.getElementById('res-advice').innerText = data.advice;
        }
    </script>
</body>
</html>
